name: Deploy CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Deploy para servidor
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: 10.0.2.15
        username: Ussumane
        key: ${{ secrets.SSH_KEY }}
        script: |
          cp index.html /var/www/html/index.html
